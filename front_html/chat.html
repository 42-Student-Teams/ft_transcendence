<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Transcendance</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="sytle.css">
</head>
<body>
    <div class="d-flex h-100">
        <div class="sidebar bg-light d-flex flex-column">
            <button class="btn btn-dark btn-block mt-3 mb-3">+ New chat</button>
            <ul class="list-unstyled pl-3 flex-grow-1">
                <li class="mb-3">
                    <i class="far fa-comments"></i> Lamillton
                </li>
                <li class="mb-3">
                    <i class="far fa-comments"></i> Jackthehack
                </li>
                <li class="mb-3">
                    <i class="far fa-comments"></i> Isaac
                </li>
            </ul>
            <hr class="sidebar-separator">
            <ul class="list-unstyled pl-3 mt-auto mb-3">
                <li class="mb-3">
                    <i class="fas fa-cog"></i> Settings
                </li>
                <li class="mb-3">
                    <i class="fas fa-language"></i> Language
                </li>
                <li class="mb-3">
                    <i class="fas fa-user"></i> My account
                </li>
                <li class="mb-3">
                    <i class="fas fa-sign-out-alt"></i> Log out
                </li>
            </ul>
        </div>
        <div class="separator-vertical"></div>
        <div class="content p-3 flex-fill d-flex flex-column">
            <h1 class="text-center text-light-gray flex-shrink-0">PONG TRANSCENDANCE</h1>
            <div class="flex-grow-1"></div>
            <div class="message-input-container w-100 flex-shrink-0">
                <div class="message-input w-100 d-flex p-3">
                    <input type="text" class="form-control message-input-box" placeholder="Type message">
                    <button class="btn btn-primary ml-2 btn-send">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
</body>
</html>
